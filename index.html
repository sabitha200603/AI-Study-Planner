<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Study Planner</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:400px;
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#333;
  margin-bottom:15px;
}

.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border:2px solid #4facfe;
  border-radius:10px;
  outline:none;
}

button{
  background:#4facfe;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0077ff;
}

ul{
  list-style:none;
  margin-top:20px;
}

li{
  background:#f1f7ff;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

li.done{
  text-decoration:line-through;
  opacity:0.6;
}

.actions button{
  margin-left:5px;
  background:#ff5c5c;
  padding:5px 8px;
  font-size:12px;
  border-radius:6px;
}

.actions button.done-btn{
  background:#28c76f;
}
</style>
</head>

<body>

<div class="container">
  <h1>📚 AI Study Planner</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter your study task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
function addTask(){
  let input = document.getElementById("taskInput");
  let taskText = input.value.trim();

  if(taskText === ""){
    alert("Please enter a task!");
    return;
  }

  let li = document.createElement("li");

  li.innerHTML = `
    <span>${taskText}</span>
    <div class="actions">
      <button class="done-btn" onclick="markDone(this)">✔</button>
      <button onclick="deleteTask(this)">✖</button>
    </div>
  `;

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}

function markDone(btn){
  let li = btn.parentElement.parentElement;
  li.classList.toggle("done");
}

function deleteTask(btn){
  let li = btn.parentElement.parentElement;
  li.remove();
}
</script>

</body>
</html>
